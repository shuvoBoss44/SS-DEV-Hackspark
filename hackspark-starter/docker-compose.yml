version: '3.8'

services:
  # -------------------------
  # BACKEND SERVICES
  # -------------------------
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      # Replaced Postgres vars with Mongo URI
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CENTRAL_API_TOKEN=${CENTRAL_API_TOKEN}
      - CENTRAL_API_URL=${CENTRAL_API_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - mongodb

  rental-service:
    build: ./rental-service
    container_name: rental-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - CENTRAL_API_TOKEN=${CENTRAL_API_TOKEN}
      - CENTRAL_API_URL=${CENTRAL_API_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - CENTRAL_API_TOKEN=${CENTRAL_API_TOKEN}
      - CENTRAL_API_URL=${CENTRAL_API_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  agentic-service:
    build: ./agentic-service
    container_name: agentic-service
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - AGENTIC_SERVICE_PORT=8004
      - MONGO_URI=${MONGO_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CENTRAL_API_TOKEN=${CENTRAL_API_TOKEN}
      - CENTRAL_API_URL=${CENTRAL_API_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8004/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - user-service
      - rental-service
      - analytics-service
      - agentic-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------
  # FRONTEND
  # -------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------
  # DATABASE
  # -------------------------
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
